<svg width="500" height="100" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <clipPath id="card-clip"><rect width="500" height="100" rx="12"/></clipPath>
    <clipPath id="art-clip"><rect x="12" y="12" width="76" height="76" rx="8"/></clipPath>
    <clipPath id="text-clip"><rect x="104" y="0" width="298" height="100"/></clipPath>
    <filter id="blob-blur" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="30"/>
    </filter>
  </defs>

  <!-- Base -->
  <rect width="500" height="100" rx="12" fill="#0a0a0a"/>

  <!-- Animated background blobs -->
  <g clip-path="url(#card-clip)">
    <g filter="url(#blob-blur)" opacity="0.55">
      <circle cx="60" cy="50" r="95" fill="#00b4b4">
        <animate attributeName="cx" values="60;115;40;90;60"    dur="22s" repeatCount="indefinite" calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1;0.45 0 0.55 1;0.45 0 0.55 1"/>
        <animate attributeName="cy" values="50;82;22;68;50"    dur="19s" repeatCount="indefinite" calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1;0.45 0 0.55 1;0.45 0 0.55 1"/>
      </circle>
      <circle cx="310" cy="15" r="85" fill="#c030a0">
        <animate attributeName="cx" values="310;245;375;275;310" dur="28s" repeatCount="indefinite" calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1;0.45 0 0.55 1;0.45 0 0.55 1"/>
        <animate attributeName="cy" values="15;78;8;58;15"      dur="24s" repeatCount="indefinite" calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1;0.45 0 0.55 1;0.45 0 0.55 1"/>
      </circle>
      <circle cx="465" cy="82" r="75" fill="#4020c0">
        <animate attributeName="cx" values="465;390;495;425;465" dur="20s" repeatCount="indefinite" calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1;0.45 0 0.55 1;0.45 0 0.55 1"/>
        <animate attributeName="cy" values="82;22;92;48;82"     dur="26s" repeatCount="indefinite" calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1;0.45 0 0.55 1;0.45 0 0.55 1"/>
      </circle>
    </g>
  </g>

  <!-- Artwork placeholder -->
  <rect x="12" y="12" width="76" height="76" rx="8" fill="#111c2a"/>
  <text x="50" y="56" text-anchor="middle" font-size="26" fill="#1a3a5a">&#9835;</text>
  <rect x="12" y="12" width="76" height="76" rx="8" fill="none" stroke="#1e3a5a" stroke-width="1"/>

  <!-- Text -->
  <g clip-path="url(#text-clip)">
    <text x="104" y="40" font-family="system-ui,-apple-system,sans-serif" font-size="15" font-weight="700" fill="#ffffff">Internet Baby</text>
    <text x="104" y="60" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#cccccc">S3RL</text>
    <text x="104" y="82" font-family="system-ui,-apple-system,sans-serif" font-size="9"  fill="#666666">&#9834; Apple Music</text>
  </g>

  <!-- Animated equalizer -->
  <rect x="410" y="72" width="6" height="10" rx="2.5" fill="#00b4b4">
    <animate attributeName="height" values="10;30;16;10" dur="1.0s" repeatCount="indefinite" begin="0s"/>
    <animate attributeName="y"      values="72;52;66;72" dur="1.0s" repeatCount="indefinite" begin="0s"/>
  </rect>
  <rect x="418" y="58" width="6" height="24" rx="2.5" fill="#00b4b4">
    <animate attributeName="height" values="24;10;28;24" dur="0.8s" repeatCount="indefinite" begin="0.2s"/>
    <animate attributeName="y"      values="58;72;54;58" dur="0.8s" repeatCount="indefinite" begin="0.2s"/>
  </rect>
  <rect x="426" y="64" width="6" height="18" rx="2.5" fill="#00b4b4">
    <animate attributeName="height" values="18;40;8;18" dur="1.2s" repeatCount="indefinite" begin="0.05s"/>
    <animate attributeName="y"      values="64;42;74;64" dur="1.2s" repeatCount="indefinite" begin="0.05s"/>
  </rect>
  <rect x="434" y="52" width="6" height="30" rx="2.5" fill="#00b4b4">
    <animate attributeName="height" values="30;12;22;30" dur="0.9s" repeatCount="indefinite" begin="0.3s"/>
    <animate attributeName="y"      values="52;70;60;52" dur="0.9s" repeatCount="indefinite" begin="0.3s"/>
  </rect>
  <rect x="442" y="68" width="6" height="14" rx="2.5" fill="#00b4b4">
    <animate attributeName="height" values="14;28;8;14" dur="1.1s" repeatCount="indefinite" begin="0.15s"/>
    <animate attributeName="y"      values="68;54;74;68" dur="1.1s" repeatCount="indefinite" begin="0.15s"/>
  </rect>
</svg>
